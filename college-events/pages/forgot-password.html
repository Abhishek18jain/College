<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — EventHub</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎪</text></svg>">
</head>
<body>
  <button class="btn btn-icon btn-ghost auth-theme-toggle" onclick="App.Theme.toggle()">
    <span class="theme-toggle-icon">🌙</span>
  </button>
  <div class="auth-page">
    <div class="hero-bg">
      <div class="gradient-orb orb-1" style="width:350px;height:350px;background:rgba(0,206,201,0.2);top:10%;right:15%;"></div>
      <div class="gradient-orb orb-2" style="width:300px;height:300px;background:rgba(253,121,168,0.15);bottom:15%;left:10%;"></div>
    </div>
    <div class="auth-container">
      <div class="auth-card glass-card-strong">
        <div class="auth-header">
          <a href="../index.html"><div class="brand-icon">🔑</div></a>
          <h1>Reset Password</h1>
          <p>Enter your email and we'll send you a reset link</p>
        </div>
        <form class="auth-form" id="forgotForm" novalidate>
          <div class="input-group">
            <input type="email" id="resetEmail" placeholder=" " required>
            <label for="resetEmail">Email Address</label>
          </div>
          <button type="submit" class="btn btn-primary auth-submit">Send Reset Link</button>
        </form>
        <div class="auth-footer" style="margin-top: var(--space-8);">
          Remember your password? <a href="login.html">Sign In</a>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/data.js"></script>
  <script src="../js/app.js"></script>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('resetEmail');
      App.Validate.clearError(email);
      if (!App.Validate.email(email.value)) {
        App.Validate.showError(email, 'Enter a valid email');
        return;
      }
      const btn = this.querySelector('.auth-submit');
      btn.classList.add('loading');
      btn.textContent = 'Sending...';
      setTimeout(() => {
        btn.classList.remove('loading');
        btn.textContent = 'Send Reset Link';
        App.Toast.success('Reset link sent to ' + email.value);
        setTimeout(() => window.location.href = 'otp-verify.html', 1000);
      }, 1500);
    });
  </script>
</body>
</html>

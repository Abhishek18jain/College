<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your EventHub account — Join the college event community.">
  <title>Sign Up — EventHub</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎪</text></svg>">
</head>
<body>
  <button class="btn btn-icon btn-ghost auth-theme-toggle" onclick="App.Theme.toggle()">
    <span class="theme-toggle-icon">🌙</span>
  </button>

  <div class="auth-page">
    <div class="hero-bg">
      <div class="gradient-orb orb-1" style="width:400px;height:400px;background:rgba(253,121,168,0.2);top:-10%;left:10%;"></div>
      <div class="gradient-orb orb-2" style="width:300px;height:300px;background:rgba(108,92,231,0.15);bottom:10%;right:5%;"></div>
    </div>

    <div class="auth-container">
      <div class="auth-card glass-card-strong">
        <div class="auth-header">
          <a href="../index.html"><div class="brand-icon">🎪</div></a>
          <h1>Create Account</h1>
          <p>Join EventHub and never miss a college event</p>
        </div>

        <form class="auth-form" id="signupForm" novalidate>
          <div class="input-group">
            <input type="text" id="signupName" placeholder=" " required autocomplete="name">
            <label for="signupName">Full Name</label>
          </div>
          <div class="input-group">
            <input type="email" id="signupEmail" placeholder=" " required autocomplete="email">
            <label for="signupEmail">College Email</label>
          </div>
          <div class="input-group">
            <select id="signupDept" required>
              <option value="" disabled selected></option>
              <option value="Computer Science">Computer Science</option>
              <option value="Electronics">Electronics</option>
              <option value="Mechanical">Mechanical</option>
              <option value="Civil">Civil</option>
              <option value="Business Studies">Business Studies</option>
              <option value="Fine Arts">Fine Arts</option>
              <option value="Design">Design</option>
              <option value="Other">Other</option>
            </select>
            <label for="signupDept">Department</label>
          </div>
          <div class="input-group">
            <input type="password" id="signupPassword" placeholder=" " required>
            <label for="signupPassword">Password</label>
            <button type="button" class="password-toggle" onclick="togglePassword('signupPassword', this)">👁</button>
          </div>
          <div class="input-group">
            <input type="password" id="signupConfirm" placeholder=" " required>
            <label for="signupConfirm">Confirm Password</label>
            <button type="button" class="password-toggle" onclick="togglePassword('signupConfirm', this)">👁</button>
          </div>

          <!-- Password Strength Indicator -->
          <div style="margin-bottom: var(--space-5);">
            <div class="progress-bar" style="height:4px;">
              <div class="progress-fill" id="passwordStrength" style="width:0%;"></div>
            </div>
            <span id="passwordStrengthText" style="font-size: var(--fs-xs); color: var(--color-text-muted); margin-top: 4px; display:block;"></span>
          </div>

          <div class="auth-options" style="justify-content: flex-start;">
            <label><input type="checkbox" id="agreeTerms"> I agree to the <a href="#" style="margin-left: 4px;">Terms & Conditions</a></label>
          </div>

          <button type="submit" class="btn btn-primary auth-submit">Create Account</button>
        </form>

        <div class="auth-divider">or sign up with</div>
        <div class="social-login">
          <button class="social-btn" onclick="App.Toast.info('Google signup coming soon!')">🔵</button>
          <button class="social-btn" onclick="App.Toast.info('GitHub signup coming soon!')">⚫</button>
          <button class="social-btn" onclick="App.Toast.info('Microsoft signup coming soon!')">🟢</button>
        </div>

        <div class="auth-footer">
          Already have an account? <a href="login.html">Sign In</a>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/app.js"></script>
  <script>
    function togglePassword(id, btn) {
      const input = document.getElementById(id);
      if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
      else { input.type = 'password'; btn.textContent = '👁'; }
    }

    // Password strength
    document.getElementById('signupPassword').addEventListener('input', function() {
      const val = this.value;
      let strength = 0;
      if (val.length >= 6) strength += 25;
      if (val.length >= 10) strength += 25;
      if (/[A-Z]/.test(val) && /[a-z]/.test(val)) strength += 25;
      if (/[0-9!@#$%^&*]/.test(val)) strength += 25;
      const bar = document.getElementById('passwordStrength');
      const text = document.getElementById('passwordStrengthText');
      bar.style.width = strength + '%';
      const colors = ['#E17055', '#E17055', '#FDCB6E', '#74B9FF', '#00B894'];
      const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
      const idx = Math.floor(strength / 25);
      bar.style.background = colors[idx];
      text.textContent = labels[idx] ? 'Password strength: ' + labels[idx] : '';
      text.style.color = colors[idx];
    });

    document.getElementById('signupForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('signupName');
      const email = document.getElementById('signupEmail');
      const dept = document.getElementById('signupDept');
      const password = document.getElementById('signupPassword');
      const confirm = document.getElementById('signupConfirm');
      const agree = document.getElementById('agreeTerms');
      let valid = true;

      [name, email, dept, password, confirm].forEach(f => App.Validate.clearError(f));

      if (!App.Validate.required(name.value)) { App.Validate.showError(name, 'Name is required'); valid = false; }
      if (!App.Validate.email(email.value)) { App.Validate.showError(email, 'Enter a valid email'); valid = false; }
      if (!dept.value) { App.Validate.showError(dept, 'Select your department'); valid = false; }
      if (!App.Validate.minLength(password.value, 6)) { App.Validate.showError(password, 'Min 6 characters'); valid = false; }
      if (password.value !== confirm.value) { App.Validate.showError(confirm, 'Passwords do not match'); valid = false; }
      if (!agree.checked) { App.Toast.warning('Please agree to the terms and conditions.'); valid = false; }

      if (!valid) return;

      const btn = this.querySelector('.auth-submit');
      btn.classList.add('loading');
      btn.textContent = 'Creating account...';

      setTimeout(() => {
        const result = App.Auth.signup(name.value, email.value, password.value, dept.value);
        btn.classList.remove('loading');
        btn.textContent = 'Create Account';
        if (result.success) {
          App.Toast.success('Account created! Redirecting...');
          setTimeout(() => window.location.href = 'otp-verify.html', 800);
        } else {
          App.Toast.error(result.message);
        }
      }, 1200);
    });
  </script>
</body>
</html>

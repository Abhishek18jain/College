<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OTP — EventHub</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎪</text></svg>">
</head>
<body>
  <button class="btn btn-icon btn-ghost auth-theme-toggle" onclick="App.Theme.toggle()">
    <span class="theme-toggle-icon">🌙</span>
  </button>
  <div class="auth-page">
    <div class="hero-bg">
      <div class="gradient-orb orb-1" style="width:350px;height:350px;background:rgba(108,92,231,0.2);top:5%;left:20%;"></div>
      <div class="gradient-orb orb-2" style="width:250px;height:250px;background:rgba(0,206,201,0.15);bottom:20%;right:15%;"></div>
    </div>
    <div class="auth-container">
      <div class="auth-card glass-card-strong">
        <div class="auth-header">
          <div class="brand-icon">📬</div>
          <h1>Verify Your Email</h1>
          <p>We've sent a 6-digit code to your email. Enter it below to verify your account.</p>
        </div>

        <form id="otpForm" novalidate>
          <div class="otp-inputs">
            <input type="text" maxlength="1" class="otp-input" data-index="0" autofocus inputmode="numeric">
            <input type="text" maxlength="1" class="otp-input" data-index="1" inputmode="numeric">
            <input type="text" maxlength="1" class="otp-input" data-index="2" inputmode="numeric">
            <input type="text" maxlength="1" class="otp-input" data-index="3" inputmode="numeric">
            <input type="text" maxlength="1" class="otp-input" data-index="4" inputmode="numeric">
            <input type="text" maxlength="1" class="otp-input" data-index="5" inputmode="numeric">
          </div>
          <button type="submit" class="btn btn-primary auth-submit">Verify & Continue</button>
        </form>

        <div class="resend-timer" id="resendTimer">
          Didn't receive the code? <a href="#" id="resendBtn">Resend in <span id="countdown">30</span>s</a>
        </div>

        <div class="auth-footer" style="margin-top: var(--space-6);">
          <a href="login.html">← Back to Login</a>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/data.js"></script>
  <script src="../js/app.js"></script>
  <script>
    // OTP Input Logic
    const otpInputs = document.querySelectorAll('.otp-input');
    otpInputs.forEach((input, idx) => {
      input.addEventListener('input', (e) => {
        const val = e.target.value.replace(/\D/g, '');
        e.target.value = val;
        if (val && idx < otpInputs.length - 1) {
          otpInputs[idx + 1].focus();
        }
        e.target.classList.toggle('filled', !!val);
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && idx > 0) {
          otpInputs[idx - 1].focus();
          otpInputs[idx - 1].value = '';
          otpInputs[idx - 1].classList.remove('filled');
        }
      });
      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
        text.split('').forEach((char, i) => {
          if (otpInputs[i]) {
            otpInputs[i].value = char;
            otpInputs[i].classList.add('filled');
          }
        });
        if (text.length > 0) otpInputs[Math.min(text.length, 5)].focus();
      });
    });

    // Countdown
    let seconds = 30;
    const countdownEl = document.getElementById('countdown');
    const resendBtn = document.getElementById('resendBtn');
    const timer = setInterval(() => {
      seconds--;
      countdownEl.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(timer);
        resendBtn.classList.add('active');
        resendBtn.innerHTML = 'Resend Code';
      }
    }, 1000);

    resendBtn.addEventListener('click', (e) => {
      e.preventDefault();
      if (!resendBtn.classList.contains('active')) return;
      App.Toast.success('OTP resent to your email!');
      resendBtn.classList.remove('active');
      seconds = 30;
      resendBtn.innerHTML = 'Resend in <span id="countdown">30</span>s';
      const newTimer = setInterval(() => {
        seconds--;
        document.getElementById('countdown').textContent = seconds;
        if (seconds <= 0) {
          clearInterval(newTimer);
          resendBtn.classList.add('active');
          resendBtn.innerHTML = 'Resend Code';
        }
      }, 1000);
    });

    // Submit
    document.getElementById('otpForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const code = Array.from(otpInputs).map(i => i.value).join('');
      if (code.length < 6) {
        App.Toast.warning('Please enter the complete 6-digit code.');
        return;
      }
      const btn = this.querySelector('.auth-submit');
      btn.classList.add('loading');
      btn.textContent = 'Verifying...';
      setTimeout(() => {
        btn.classList.remove('loading');
        btn.textContent = 'Verify & Continue';
        App.Toast.success('Email verified successfully! 🎉');
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      }, 1500);
    });
  </script>
</body>
</html>

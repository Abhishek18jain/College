<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to EventHub — Access your college event dashboard.">
  <title>Login — EventHub</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎪</text></svg>">
</head>
<body>
  <button class="btn btn-icon btn-ghost auth-theme-toggle" onclick="App.Theme.toggle()">
    <span class="theme-toggle-icon">🌙</span>
  </button>

  <div class="auth-page">
    <div class="hero-bg">
      <div class="gradient-orb orb-1" style="width:400px;height:400px;background:rgba(108,92,231,0.2);top:-10%;right:10%;"></div>
      <div class="gradient-orb orb-2" style="width:300px;height:300px;background:rgba(0,206,201,0.15);bottom:10%;left:5%;"></div>
    </div>

    <div class="auth-container">
      <div class="auth-card glass-card-strong">
        <div class="auth-header">
          <a href="../index.html"><div class="brand-icon">🎪</div></a>
          <h1>Welcome Back</h1>
          <p>Sign in to continue to your dashboard</p>
        </div>

        <form class="auth-form" id="loginForm" novalidate>
          <div class="input-group">
            <input type="email" id="loginEmail" placeholder=" " required autocomplete="email">
            <label for="loginEmail">Email Address</label>
          </div>
          <div class="input-group">
            <input type="password" id="loginPassword" placeholder=" " required autocomplete="current-password">
            <label for="loginPassword">Password</label>
            <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">👁</button>
          </div>

          <div class="auth-options">
            <label><input type="checkbox" checked> Remember me</label>
            <a href="forgot-password.html">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-primary auth-submit">Sign In</button>
        </form>

        <div class="auth-divider">or continue with</div>
        <div class="social-login">
          <button class="social-btn" onclick="App.Toast.info('Google login coming soon!')">🔵</button>
          <button class="social-btn" onclick="App.Toast.info('GitHub login coming soon!')">⚫</button>
          <button class="social-btn" onclick="App.Toast.info('Microsoft login coming soon!')">🟢</button>
        </div>

        <div class="auth-footer">
          Don't have an account? <a href="signup.html">Sign Up</a>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/app.js"></script>
  <script>
    function togglePassword(id, btn) {
      const input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁';
      }
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail');
      const password = document.getElementById('loginPassword');
      let valid = true;

      App.Validate.clearError(email);
      App.Validate.clearError(password);

      if (!App.Validate.required(email.value)) {
        App.Validate.showError(email, 'Email is required');
        valid = false;
      } else if (!App.Validate.email(email.value)) {
        App.Validate.showError(email, 'Enter a valid email');
        valid = false;
      }
      if (!App.Validate.required(password.value)) {
        App.Validate.showError(password, 'Password is required');
        valid = false;
      }

      if (!valid) return;

      const btn = this.querySelector('.auth-submit');
      btn.classList.add('loading');
      btn.textContent = 'Signing in...';

      setTimeout(() => {
        const result = App.Auth.login(email.value, password.value);
        btn.classList.remove('loading');
        btn.textContent = 'Sign In';

        if (result.success) {
          App.Toast.success('Welcome back, ' + result.user.name.split(' ')[0] + '!');
          setTimeout(() => {
            window.location.href = result.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
          }, 800);
        } else {
          App.Toast.error(result.message);
        }
      }, 1200);
    });

    // Demo helper
    document.getElementById('loginEmail').value = 'abhijeet@college.edu';
  </script>
</body>
</html>
